<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuzzleBit Word - 5 Levels</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 1. LOADING SCREEN -->
    <div id="loadingScreen">
        <img src="assets/loading/logo.svg" class="logo">
        <div class="loader"></div>
    </div>

    <!-- 2. LANGUAGE SELECTION -->
    <div class="languageScreen" style="display:none;">
        <h1>SELECT LANGUAGE</h1>
        <button class="langBtn active">English</button>
        <button class="playBtn">PLAY</button>
    </div>

    <!-- 3. GAMEPLAY UI -->
    <div class="gameUI" style="display:none;">
        <div class="topBar">
            <div class="level-indicator">Level <span id="currentLevel">1</span></div>
            <div class="coins">
                <img src="assets/ui/coin.png" width="20" onerror="this.src='https://cdn-icons-png.flaticon.com/512/217/217853.png'">
                <span id="coinValue">250</span>
            </div>
        </div>

        <div class="grid" id="puzzleGrid">
            <!-- Boxes generated dynamically -->
        </div>

        <div class="current-word-display" id="currentWord"></div>

        <div class="letterWheel" id="letterWheel">
            <!-- Letters generated dynamically -->
        </div>

        <div class="ui-buttons">
            <button class="iconBtn" id="shuffleBtn"><img src="assets/ui/shuffle.png" width="30" onerror="this.src='https://cdn-icons-png.flaticon.com/512/61/61702.png'"></button>
            <button class="iconBtn" id="hintBtn"><img src="assets/ui/hint.png" width="30" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1000/1000882.png'"></button>
        </div>
    </div>

    <!-- 4. LEVEL COMPLETE POPUP -->
    <div id="levelComplete" class="popup" style="display:none;">
        <div class="popup-content">
            <h2>EXCELLENT!</h2>
            <p>Level Complete</p>
            <div class="reward">+50 💎</div>
            <button id="nextLevelBtn" class="playBtn">NEXT LEVEL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
